[flake8]
max-line-length = 100
# E203/E226/W503 conflict with black's formatting; E501 handled by black's wrapping.
extend-ignore = E203, E226, E501, W503
exclude =
    .git,
    __pycache__,
    venv,
    build,
    dist,
    notebooks
per-file-ignores =
    # Test modules insert the project root on sys.path before importing src,
    # so module-level imports legitimately appear after that statement.
    tests/*: E402
    # These modules set up sys.path / the matplotlib backend before importing.
    src/explainability/shap_engine.py: E402
    src/score.py: E402

[isort]
profile = black
line_length = 100
skip = venv,notebooks

[tool:pytest]
testpaths = tests
